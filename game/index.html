<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #faf8ef;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  user-select: none;
}
.container { width: 500px; }
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
h1 { font-size: 68px; color: #776e65; }
.scores { display: flex; gap: 8px; }
.score-box {
  background: #bbada0;
  color: #fff;
  padding: 8px 20px;
  border-radius: 6px;
  text-align: center;
  min-width: 90px;
}
.score-label { font-size: 11px; text-transform: uppercase; }
.score-value { font-size: 22px; font-weight: bold; }
.controls { display: flex; gap: 8px; margin-top: 8px; }
.controls button {
  flex: 1;
  padding: 10px;
  border: none;
  background: #8f7a66;
  color: #fff;
  font-size: 14px;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
}
.controls button:hover { background: #9f8b77; }
.board {
  position: relative;
  background: #bbada0;
  border-radius: 8px;
  width: 500px;
  height: 500px;
  padding: 12px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: 12px;
  width: 100%;
  height: 100%;
}
.cell {
  background: rgba(238, 228, 218, 0.35);
  border-radius: 6px;
}
.tile-container {
  position: absolute;
  top: 12px; left: 12px;
  right: 12px; bottom: 12px;
}
.tile {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  border-radius: 6px;
  transition: transform 100ms ease;
  z-index: 1;
}
.tile-2    { background: #eee4da; color: #776e65; }
.tile-4    { background: #ede0c8; color: #776e65; }
.tile-8    { background: #f2b179; color: #f9f6f2; }
.tile-16   { background: #f59563; color: #f9f6f2; }
.tile-32   { background: #f67c5f; color: #f9f6f2; }
.tile-64   { background: #f65e3b; color: #f9f6f2; }
.tile-128  { background: #edcf72; color: #f9f6f2; font-size: 36px; }
.tile-256  { background: #edcc61; color: #f9f6f2; font-size: 36px; }
.tile-512  { background: #edc850; color: #f9f6f2; font-size: 36px; }
.tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 30px; }
.tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 30px; }
.tile-super { background: #3c3a32; color: #f9f6f2; font-size: 24px; }
.tile-new { animation: pop 200ms ease; }
@keyframes pop {
  0%   { transform: scale(0); }
  50%  { transform: scale(1.1); }
  100% { transform: scale(1); }
}
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(238, 228, 218, 0.73);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.overlay h2 { font-size: 48px; color: #776e65; margin-bottom: 16px; }
.overlay button {
  padding: 12px 32px;
  font-size: 16px;
  border: none;
  background: #8f7a66;
  color: #fff;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}
.overlay button:hover { background: #9f8b77; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>2048</h1>
    <div class="scores">
      <div class="score-box">
        <div class="score-label">分数</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="score-label">最高分</div>
        <div class="score-value" id="best">0</div>
      </div>
    </div>
  </div>
  <div class="controls">
    <button onclick="newGame()">新游戏</button>
  </div>
  <div class="board" id="board">
    <div class="grid">
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="tile-container" id="tileContainer"></div>
  </div>
</div>

<script>
const SIZE = 4;
let grid = [];
let score = 0;
let best = parseInt(localStorage.getItem('2048_best')) || 0;

const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const container = document.getElementById('tileContainer');
const board = document.getElementById('board');

function initGrid() {
  grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  score = 0;
  updateScore();
}

function addTile() {
  const empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 0) empty.push([r, c]);
  if (empty.length === 0) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function updateScore() {
  scoreEl.textContent = score;
  if (score > best) {
    best = score;
    localStorage.setItem('2048_best', best);
  }
  bestEl.textContent = best;
}

function render() {
  container.innerHTML = '';
  const gap = 12;
  const padding = 12;
  const boardW = board.clientWidth - padding * 2;
  const tileSize = (boardW - gap * (SIZE - 1)) / SIZE;
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const val = grid[r][c];
      if (val === 0) continue;
      const tile = document.createElement('div');
      tile.className = 'tile';
      if (val <= 2048) {
        tile.classList.add('tile-' + val);
      } else {
        tile.classList.add('tile-super');
      }
      tile.textContent = val;
      tile.style.width = tileSize + 'px';
      tile.style.height = tileSize + 'px';
      tile.style.lineHeight = tileSize + 'px';
      tile.style.fontSize = val >= 128 ? (tileSize * 0.33) + 'px' : (tileSize * 0.45) + 'px';
      tile.style.left = (padding + c * (tileSize + gap)) + 'px';
      tile.style.top = (padding + r * (tileSize + gap)) + 'px';
      container.appendChild(tile);
    }
  }
}

function slideRow(row) {
  let arr = row.filter(v => v !== 0);
  let merged = [];
  let skip = false;
  for (let i = 0; i < arr.length; i++) {
    if (skip) { skip = false; continue; }
    if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
      const val = arr[i] * 2;
      merged.push(val);
      score += val;
      skip = true;
    } else {
      merged.push(arr[i]);
    }
  }
  while (merged.length < SIZE) merged.push(0);
  return merged;
}

function moveLeft() {
  let moved = false;
  for (let r = 0; r < SIZE; r++) {
    const oldRow = [...grid[r]];
    grid[r] = slideRow(grid[r]);
    if (grid[r].some((v, i) => v !== oldRow[i])) moved = true;
  }
  return moved;
}

function moveRight() {
  for (let r = 0; r < SIZE; r++) grid[r].reverse();
  const moved = moveLeft();
  for (let r = 0; r < SIZE; r++) grid[r].reverse();
  return moved;
}

function moveUp() {
  grid = transpose(grid);
  const moved = moveLeft();
  grid = transpose(grid);
  return moved;
}

function moveDown() {
  grid = transpose(grid);
  for (let r = 0; r < SIZE; r++) grid[r].reverse();
  const moved = moveLeft();
  for (let r = 0; r < SIZE; r++) grid[r].reverse();
  grid = transpose(grid);
  return moved;
}

function transpose(g) {
  return g[0].map((_, c) => g.map(row => row[c]));
}

function isGameOver() {
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      if (grid[r][c] === 0) return false;
      if (c + 1 < SIZE && grid[r][c] === grid[r][c + 1]) return false;
      if (r + 1 < SIZE && grid[r][c] === grid[r + 1][c]) return false;
    }
  }
  return true;
}

function hasWon() {
  return grid.some(row => row.some(v => v >= 2048));
}

function showOverlay(title, msg) {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `<h2>${title}</h2><p style="color:#776e65;font-size:18px;margin-bottom:20px">${msg}</p><button onclick="newGame()">再来一局</button>`;
  board.appendChild(overlay);
}

function handleMove(moved) {
  if (!moved) return;
  addTile();
  updateScore();
  render();
  if (hasWon()) {
    setTimeout(() => showOverlay('你赢了！', `最终分数：${score}`), 300);
  } else if (isGameOver()) {
    setTimeout(() => showOverlay('游戏结束', `最终分数：${score}`), 300);
  }
}

function newGame() {
  const overlay = board.querySelector('.overlay');
  if (overlay) overlay.remove();
  initGrid();
  addTile();
  addTile();
  updateScore();
  render();
}

document.addEventListener('keydown', e => {
  const map = { ArrowLeft: moveLeft, ArrowRight: moveRight, ArrowUp: moveUp, ArrowDown: moveDown };
  if (map[e.key]) {
    e.preventDefault();
    handleMove(map[e.key]());
  }
});

// Touch support
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < 30) return;
  if (absDx > absDy) {
    handleMove(dx > 0 ? moveRight() : moveLeft());
  } else {
    handleMove(dy > 0 ? moveDown() : moveUp());
  }
});

newGame();
</script>
</body>
</html>
